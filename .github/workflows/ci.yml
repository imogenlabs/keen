name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Build
        run: |
          go build -o bin/keen ./cmd/keen/
          go build -o bin/keen-mcp ./cmd/keen-mcp/

      - name: Test
        run: go test ./...

      - name: Cross-compile check
        run: |
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/keen/
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/keen-mcp/
